name: Golden Image Factory Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      os_choice:
        description: 'Target Operating System'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - Ubuntu 22.04
          - RHEL 9
          - Huawei Rocky 9
          - Rocky 9
          - Windows Server 2022
      scan_only:
        description: 'Skip Packer Build (Run Compliance Scan Only)'
        required: true
        default: false
        type: boolean
      azure_region:
        description: 'Deployment Region (Leave blank to use default, southeastasia)'
        required: false
        type: string
      ubuntu_image_name_override:
        description: 'Custom Ubuntu Image Name Override (Optional)'
        required: false
        type: string
      rhel_image_name_override:
        description: 'Custom RHEL Image Name Override (Optional)'
        required: false
        type: string
      rocky_image_name_override:
        description: 'Custom Rocky Image Name Override (Optional)'
        required: false
        type: string
      windows_image_name_override:
        description: 'Custom Windows Image Name Override (Optional)'
        required: false
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  # ============================================================
  # STAGE 1: PREPARE (Calculate SemVer & Build Matrix)
  # ============================================================
  prepare:
    name: Prepare Pipeline & SemVer
    runs-on: ubuntu-latest
    outputs:
      new_version:   ${{ steps.version.outputs.clean_version || '1.0.0' }}
      matrix_config: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Calculate Next SemVer
        id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: patch

      - name: Normalize Version String
        id: version
        run: |
          RAW="${{ steps.semver.outputs.new_version }}"
          CLEAN="${RAW#v}"
          CLEAN="${CLEAN%%-*}"
          echo "clean_version=$CLEAN" >> $GITHUB_OUTPUT

      - name: Set Dynamic Matrix
        id: set-matrix
        run: |
          CHOICE="${{ inputs.os_choice }}"
          if [[ -z "$CHOICE" || "$CHOICE" == "all" ]]; then
            echo 'matrix=[{"os":"Ubuntu 22.04","runner":"ubuntu-latest"},{"os":"RHEL 9","runner":"ubuntu-latest"},{"os":"Rocky 9","runner":"ubuntu-latest"},{"os":"Windows Server 2022","runner":"ubuntu-latest"}]' >> $GITHUB_OUTPUT
          elif [[ "$CHOICE" == "Huawei Rocky 9" ]]; then
            echo 'matrix=[{"os":"Huawei Rocky 9","runner":"self-hosted"}]' >> $GITHUB_OUTPUT
          elif [[ "$CHOICE" == "Ubuntu 22.04" ]]; then
            echo 'matrix=[{"os":"Ubuntu 22.04","runner":"ubuntu-latest"}]' >> $GITHUB_OUTPUT
          elif [[ "$CHOICE" == "RHEL 9" ]]; then
            echo 'matrix=[{"os":"RHEL 9","runner":"ubuntu-latest"}]' >> $GITHUB_OUTPUT
          elif [[ "$CHOICE" == "Rocky 9" ]]; then
            echo 'matrix=[{"os":"Rocky 9","runner":"ubuntu-latest"}]' >> $GITHUB_OUTPUT
          elif [[ "$CHOICE" == "Windows Server 2022" ]]; then
            echo 'matrix=[{"os":"Windows Server 2022","runner":"ubuntu-latest"}]' >> $GITHUB_OUTPUT
          fi

  # ============================================================
  # STAGE 2: BUILD & SCAN (Parallel Matrix)
  # ============================================================
  matrix-factory:
    name: Build & Scan (${{ matrix.os_config.os }})
    needs: prepare
    runs-on: ${{ matrix.os_config.runner }}
    strategy:
      fail-fast: false
      matrix:
        os_config: ${{ fromJson(needs.prepare.outputs.matrix_config) }}

    env:
      AZURE_RG:       ${{ vars.AZURE_RG }}
      AZURE_GALLERY:  ${{ vars.AZURE_GALLERY }}
      AZURE_LOCATION: ${{ inputs.azure_region || vars.AZURE_LOCATION }}
      VM_SIZE:        ${{ vars.VM_SIZE }}
      WINDOWS_ADMIN_PASS: ${{ secrets.WINDOWS_LOCAL_ADMIN_PASSWORD }}

      # ── Shared PKR_VAR_* for all OS builds ──────────────────────────────
      PKR_VAR_resource_group:        ${{ vars.AZURE_RG }}
      PKR_VAR_gallery_name:          ${{ vars.AZURE_GALLERY }}
      PKR_VAR_location:              ${{ inputs.azure_region || vars.AZURE_LOCATION }}
      PKR_VAR_vm_size:               ${{ vars.VM_SIZE }}
      PKR_VAR_subscription_id:       ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      PKR_VAR_local_admin_username:  sysadmin
      PKR_VAR_local_admin_password:  ${{ secrets.WINDOWS_LOCAL_ADMIN_PASSWORD }}

      PKR_VAR_client_id:            ${{ secrets.AZURE_CLIENT_ID }}
      PKR_VAR_client_secret:        ${{ secrets.AZURE_CLIENT_SECRET }}
      PKR_VAR_tenant_id:            ${{ secrets.AZURE_TENANT_ID }}
      
      # ── Huawei Cloud SDK variables (Required for pre-flight auth) ───────
      HW_ACCESS_KEY:                ${{ secrets.HW_ACCESS_KEY }}
      HW_SECRET_KEY:                ${{ secrets.HW_SECRET_KEY }}
      HW_PROJECT_ID:                ${{ secrets.HW_PROJECT_ID }}
      HW_LOCATION:                  ${{ vars.HW_LOCATION }}
      
      # ── Huawei Cloud Packer variables (Required for .pkr.hcl) ───────────
      PKR_VAR_hw_access_key:        ${{ secrets.HW_ACCESS_KEY }}
      PKR_VAR_hw_secret_key:        ${{ secrets.HW_SECRET_KEY }}
      PKR_VAR_hw_project_id:        ${{ secrets.HW_PROJECT_ID }}
      PKR_VAR_hw_vpc_id:            ${{ secrets.HW_VPC_ID }}
      PKR_VAR_hw_subnet_id:         ${{ secrets.HW_SUBNET_ID }}
      PKR_VAR_hw_security_group_id: ${{ secrets.HW_SECURITY_GROUP_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Authenticate to Azure
        if: ${{ matrix.os_config.os != 'Huawei Rocky 9' }}
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve VM Slug
        run: |
          case "${{ matrix.os_config.os }}" in
            "Ubuntu 22.04")        echo "VM_SLUG=ubuntu"  >> $GITHUB_ENV ;;
            "RHEL 9")              echo "VM_SLUG=rhel"    >> $GITHUB_ENV ;;
            "Rocky 9")             echo "VM_SLUG=rocky"   >> $GITHUB_ENV ;;
            "Windows Server 2022") echo "VM_SLUG=windows" >> $GITHUB_ENV ;;
            "Huawei Rocky 9")       echo "VM_SLUG=hw-rocky" >> $GITHUB_ENV ;;
            *)
              echo "ERROR: Unrecognised OS '${{ matrix.os_config.os }}'"
              exit 1
              ;;
          esac

      - name: Pre-Flight Marketplace Terms Acceptance
        if: ${{ matrix.os_config.os == 'RHEL 9' || matrix.os_config.os == 'Rocky 9'}}
        run: |
          az vm image terms accept --urn resf:rockylinux-x86_64:9-base:latest || true
          az vm image terms accept --urn RedHat:RHEL:9-lvm:latest || true

      - name: Ensure Compute Gallery Image Definition Exists
        if: ${{ matrix.os_config.os != 'Huawei Rocky 9' }}
        run: |
          case "${{ matrix.os_config.os }}" in
            "Ubuntu 22.04")
              DEF_NAME="ubuntu-nvme-cis"
              OS_TYPE="Linux"
              PUBLISHER="Canonical"
              OFFER="0001-com-ubuntu-server-jammy"
              SKU="22_04-lts-gen2"
              ;;
            "RHEL 9")
              DEF_NAME="rhel-nvme-cis"
              OS_TYPE="Linux"
              PUBLISHER="RedHat"
              OFFER="RHEL"
              SKU="9-lvm"
              ;;
            "Rocky 9")
              DEF_NAME="rocky-nvme-cis"
              OS_TYPE="Linux"
              PUBLISHER="resf"
              OFFER="rockylinux-x86_64"
              SKU="9-base"
              PLAN_ARGS="--plan-name 9-base --plan-publisher resf --plan-product rockylinux-x86_64"
              ;;
            "Windows Server 2022")
              DEF_NAME="windows-server-2022-cis"
              OS_TYPE="Windows"
              PUBLISHER="MicrosoftWindowsServer"
              OFFER="WindowsServer"
              SKU="2022-datacenter-g2"
              ;;
            *)
              echo "ERROR: Unrecognised OS '${{ matrix.os_config.os }}'"
              exit 1
              ;;
          esac

          EXISTING=$(az sig image-definition show \
            --resource-group ${{ env.AZURE_RG }} \
            --gallery-name   ${{ env.AZURE_GALLERY }} \
            --gallery-image-definition "$DEF_NAME" \
            --query name -o tsv 2>/dev/null || echo "")

          if [[ -n "$EXISTING" ]]; then
            echo "Definition '$DEF_NAME' already exists — skipping."
            exit 0
          fi

          echo "Creating image definition '$DEF_NAME'..."
          az sig image-definition create \
            --resource-group ${{ env.AZURE_RG }} \
            --gallery-name   ${{ env.AZURE_GALLERY }} \
            --gallery-image-definition "$DEF_NAME" \
            --publisher      "$PUBLISHER" \
            --offer          "$OFFER" \
            --sku            "$SKU" \
            --os-type        "$OS_TYPE" \
            --os-state       Generalized \
            ${PLAN_ARGS:-}

          echo "Definition '$DEF_NAME' created successfully."

      # ──────────────────────────────────────────────────────────────────────
      # PACKER BUILD PHASE
      # ──────────────────────────────────────────────────────────────────────

      - name: Setup HashiCorp Packer
        if: ${{ inputs.scan_only != true }}
        uses: hashicorp/setup-packer@v3.2.0
        with:
          version: 'latest'

      - name: Install Ansible & WinRM dependencies (Windows only)
        if: ${{ inputs.scan_only != true && matrix.os_config.os == 'Windows Server 2022' }}
        run: |
          pip install \
            ansible~=9.0 \
            pywinrm \
            xmltodict \
            passlib \
            jmespath

      - name: Install Ansible Galaxy roles (Windows Server 2022 only)
        if: ${{ inputs.scan_only != true && matrix.os_config.os == 'Windows Server 2022' }}
        working-directory: ./ansible
        run: |
          ansible-galaxy install -r requirements.yml --roles-path roles/

      - name: Packer Init
        if: ${{ inputs.scan_only != true }}
        env:
          PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: packer init .
        working-directory: >-
          ${{ matrix.os_config.os == 'Ubuntu 22.04'        && './packer-ubuntu'
           || matrix.os_config.os == 'RHEL 9'              && './packer-rhel'
           || matrix.os_config.os == 'Rocky 9'             && './packer-rocky'
           || matrix.os_config.os == 'Huawei Rocky 9'       && './packer-huawei-rocky'
           ||                                       './packer-windows' }}

      - name: Re-authenticate to Azure (Windows — pre-build refresh)
        if: ${{ inputs.scan_only != true && matrix.os_config.os == 'Windows Server 2022' }}
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}


      - name: Build Golden Image (Linux)
        if: ${{ inputs.scan_only != true && matrix.os_config.os != 'Windows Server 2022' }}
        run: |
          packer build \
            -force \
            -var "image_version=${{ needs.prepare.outputs.new_version }}" \
            .
        working-directory: >-
          ${{ matrix.os_config.os == 'Ubuntu 22.04'  && './packer-ubuntu'
           || matrix.os_config.os == 'RHEL 9'        && './packer-rhel'
           || matrix.os_config.os == 'Huawei Rocky 9' && './packer-huawei-rocky'
           ||                                  './packer-rocky' }}

      - name: Build Golden Image (Windows)
        if: ${{ inputs.scan_only != true && matrix.os_config.os == 'Windows Server 2022' }}
        run: |
          packer build \
            -force \
            -var "image_version=${{ needs.prepare.outputs.new_version }}" \
            -var "image_definition_name=${{ inputs.windows_image_name_override || 'windows-server-2022-cis' }}" \
            -var "client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -var "client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
            -var "tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var "subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            .
        working-directory: ./packer-windows

      # ──────────────────────────────────────────────────────────────────────
      # DEPLOY EPHEMERAL VM FOR SCANNING
      # ──────────────────────────────────────────────────────────────────────

      - name: Generate Ephemeral SSH Key
        run: ssh-keygen -t ed25519 -f ~/.ssh/scanner_key -N ""

      - name: Resolve Target Image Name
        id: image
        run: |
          case "${{ matrix.os_config.os }}" in
            "Ubuntu 22.04")        echo "name=${{ inputs.ubuntu_image_name_override || 'ubuntu-nvme-cis' }}" >> $GITHUB_OUTPUT ;;
            "RHEL 9")              echo "name=${{ inputs.rhel_image_name_override   || 'rhel-nvme-cis'   }}" >> $GITHUB_OUTPUT ;;
            "Huawei Rocky 9")       echo "name=rocky9-cis-v${{ needs.prepare.outputs.new_version }}" >> $GITHUB_OUTPUT ;;            
            "Rocky 9")             echo "name=${{ inputs.rocky_image_name_override  || 'rocky-nvme-cis'  }}" >> $GITHUB_OUTPUT ;;
            "Windows Server 2022") echo "name=${{ inputs.windows_image_name_override || 'windows-server-2022-cis' }}" >> $GITHUB_OUTPUT ;;
          esac

      - name: Re-authenticate to Azure (pre-scan refresh)
        if: ${{ matrix.os_config.os != 'Huawei Rocky 9' }}
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare SSH Key Injection Script
        if: ${{ matrix.os_config.os == 'Windows Server 2022' }}
        run: |
          cat > /tmp/inject-ssh-key.ps1 << 'PSEOF'
          $maxWait = 600
          $waited = 0
          while (-not (Get-LocalUser -Name 'azureuser' -ErrorAction SilentlyContinue)) {
            Write-Output "Waiting for azureuser account to be created... ($waited s)"
            Start-Sleep -Seconds 15
            $waited += 15
            if ($waited -ge $maxWait) {
              Write-Output "ERROR: azureuser account never appeared. Aborting."
              Write-Output "--- Local users that DO exist ---"
              Get-LocalUser | Select-Object Name, Enabled, LastLogon | Format-Table
              Write-Output "--- Azure VM Agent log ---"
              Get-Content "C:\WindowsAzure\Logs\WaAppAgent.log" -Tail 30 -ErrorAction SilentlyContinue
              exit 1
            }
          }
          Write-Output "azureuser account exists. Proceeding."

          $waited = 0
          while ((Get-ScheduledTask -TaskName 'RestoreCISPolicies' -ErrorAction SilentlyContinue).State -eq 'Running') {
            Write-Output "Waiting for RestoreCIS to complete... ($waited s)"
            Start-Sleep -Seconds 10
            $waited += 10
            if ($waited -ge 300) { Write-Output 'Timeout waiting for RestoreCIS'; break }
          }
          Write-Output "RestoreCIS completed or not running. Proceeding with key injection."

          $azureuserSid = (Get-LocalUser -Name 'azureuser').SID.Value
          $profilePath = (Get-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\ProfileList\$azureuserSid" -ErrorAction SilentlyContinue).ProfileImagePath
          if (-not $profilePath) { $profilePath = "C:\Users\azureuser" }
          Write-Output "User profile path: $profilePath"

          $userSsh = "$profilePath\.ssh"
          if (-not (Test-Path $userSsh)) {
            New-Item -ItemType Directory -Force -Path $userSsh | Out-Null
          }

          Set-Content -Path "$userSsh\authorized_keys" -Value 'SSH_PUBLIC_KEY_PLACEHOLDER' -Force
          icacls.exe "$userSsh\authorized_keys" /inheritance:r /grant "*$($azureuserSid):(F)" /grant 'NT AUTHORITY\SYSTEM:(F)'
          
          $sshProgramData = "$env:ProgramData\ssh"
          if (-not (Test-Path $sshProgramData)) {
            New-Item -ItemType Directory -Force -Path $sshProgramData | Out-Null
          }
          $adminKeysPath = "$sshProgramData\administrators_authorized_keys"
          Set-Content -Path $adminKeysPath -Value 'SSH_PUBLIC_KEY_PLACEHOLDER' -Force
          icacls.exe $adminKeysPath /inheritance:r /grant 'NT AUTHORITY\SYSTEM:(F)' /grant 'BUILTIN\Administrators:(F)'

          Restart-Service sshd -Force
          Write-Output "SSH key injected and sshd restarted."
          PSEOF
          
      - name: Configure Huawei Cloud CLI
        if: ${{ matrix.os_config.os == 'Huawei Rocky 9' }}
        run: |
          hcloud configure set \
            --cli-access-key="${{ secrets.HW_ACCESS_KEY }}" \
            --cli-secret-key="${{ secrets.HW_SECRET_KEY }}" \
            --cli-region="${{ vars.HW_LOCATION }}"

      - name: Deploy Ephemeral VM
        run: |
          if [[ "${{ matrix.os_config.os }}" == "Huawei Rocky 9" ]]; then
            # ── Huawei ECS deploy ────────────────────────────────────────

            cat > /tmp/get_hw_image.py << 'PYEOF'
            import sys, json

            imgs = json.load(sys.stdin).get('images', [])
            if not imgs:
                print("ERROR: No matching image found", file=sys.stderr)
                sys.exit(1)
            print(imgs[0]['id'])
            PYEOF

            cat > /tmp/get_hw_ip.py << 'PYEOF'
            import sys, json

            data = json.load(sys.stdin)
            for s in data.get('servers', []):
                for addr_list in s.get('addresses', {}).values():
                    for addr in addr_list:
                        # Grab the private internal IP ('fixed') instead of public
                        if addr.get('OS-EXT-IPS:type') == 'fixed':
                            print(addr['addr'])
                            sys.exit(0)
            sys.exit(1)
            PYEOF

            HW_IMAGE_ID=$(hcloud IMS ListImages \
              --cli-region="${{ vars.HW_LOCATION }}" \
              --name="rocky9-cis-v${{ needs.prepare.outputs.new_version }}" \
              | python3 /tmp/get_hw_image.py)

            if [[ -z "$HW_IMAGE_ID" ]]; then
              echo "ERROR: Could not retrieve Huawei image ID."
              exit 1
            fi
            echo "Huawei image ID: $HW_IMAGE_ID"

            PUB_KEY=$(cat ~/.ssh/scanner_key.pub)

            hcloud ECS CreateKeypair \
              --cli-region="${{ vars.HW_LOCATION }}" \
              --KeyName="scanner-key-${{ github.run_number }}" \
              --PublicKey="$PUB_KEY"

            hcloud ECS CreatePostPaidServers \
              --cli-region="${{ vars.HW_LOCATION }}" \
              --server.name="scan-hw-rocky-vm" \
              --server.imageRef="$HW_IMAGE_ID" \
              --server.flavorRef="s6.large.2" \
              --server.vpcid="${{ secrets.HW_VPC_ID }}" \
              --server.networks.0.uuid="${{ secrets.HW_SUBNET_ID }}" \
              --server.security_groups.0.id="${{ secrets.HW_SECURITY_GROUP_ID }}" \
              --server.key_name="scanner-key-${{ github.run_number }}"

            echo "Waiting 60s for ECS instance to initialise..."
            sleep 60

            VM_IP=$(hcloud ECS ListServers \
              --cli-region="${{ vars.HW_LOCATION }}" \
              --name="scan-hw-rocky-vm" \
              | python3 /tmp/get_hw_ip.py)

            if [[ -z "$VM_IP" ]]; then
              echo "ERROR: Could not retrieve Huawei VM private IP."
              exit 1
            fi
            echo "Huawei VM IP: $VM_IP"
            echo "VM_IP=$VM_IP" >> $GITHUB_ENV

          else
            # ── Azure deploy ─────────────────────────────────────────────
            IMAGE_ID=$(az sig image-definition show \
              --resource-group  ${{ env.AZURE_RG }} \
              --gallery-name    ${{ env.AZURE_GALLERY }} \
              --gallery-image-definition ${{ steps.image.outputs.name }} \
              --query id --output tsv)

            if [[ "${{ matrix.os_config.os }}" == "Windows Server 2022" ]]; then
              az vm create \
                --resource-group  ${{ env.AZURE_RG }} \
                --name            scan-${{ env.VM_SLUG }}-vm \
                --image           "$IMAGE_ID" \
                --admin-username  azureuser \
                --admin-password  "${{ env.WINDOWS_ADMIN_PASS }}" \
                --location        ${{ env.AZURE_LOCATION }} \
                --size            ${{ env.VM_SIZE }} \
                --nic-delete-option delete \
                --os-disk-delete-option delete

              RUNNER_IP=$(curl -s --max-time 10 https://api.ipify.org)
              az network nsg rule create \
                --resource-group ${{ env.AZURE_RG }} \
                --nsg-name scan-${{ env.VM_SLUG }}-vmNSG \
                --name Allow-SSH-Pipeline \
                --priority 1010 \
                --destination-port-ranges 22 \
                --source-address-prefixes "$RUNNER_IP/32" \
                --access Allow \
                --protocol Tcp

              echo 'Write-Output "Starting Pre-Scan Configuration..."' > /tmp/inject-ssh-key.ps1
              echo 'Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" -Name "LocalAccountTokenFilterPolicy" -Value 1 -Force' >> /tmp/inject-ssh-key.ps1
              echo '$adminKeysPath = "$env:ProgramData\ssh\administrators_authorized_keys"' >> /tmp/inject-ssh-key.ps1
              echo 'Set-Content -Path $adminKeysPath -Value "SSH_PUBLIC_KEY_PLACEHOLDER" -Encoding Ascii -Force' >> /tmp/inject-ssh-key.ps1
              echo 'icacls.exe $adminKeysPath /inheritance:r /grant "*S-1-5-18:(F)" /grant "*S-1-5-32-544:(F)" | Out-Null' >> /tmp/inject-ssh-key.ps1
              echo '$sshdConfig = "$env:ProgramData\ssh\sshd_config"' >> /tmp/inject-ssh-key.ps1
              echo '(Get-Content $sshdConfig) -replace "(?m)^#?StrictModes yes", "StrictModes no" | Set-Content $sshdConfig -Encoding Ascii' >> /tmp/inject-ssh-key.ps1
              echo 'Restart-Service sshd -Force' >> /tmp/inject-ssh-key.ps1
              echo 'Write-Output "SSH key injected and sshd restarted."' >> /tmp/inject-ssh-key.ps1

              PUB_KEY=$(cat ~/.ssh/scanner_key.pub)
              sed -i "s|SSH_PUBLIC_KEY_PLACEHOLDER|${PUB_KEY}|g" /tmp/inject-ssh-key.ps1

              echo "Waiting 60s for VM provisioning to stabilise..."
              sleep 60

              az vm run-command invoke \
                --resource-group ${{ env.AZURE_RG }} \
                --name scan-${{ env.VM_SLUG }}-vm \
                --command-id RunPowerShellScript \
                --scripts @/tmp/inject-ssh-key.ps1

              AUTO_SHUTDOWN_TIME=$(date -u -d '+2 hours' '+%H%M')
              az vm auto-shutdown \
                --resource-group ${{ env.AZURE_RG }} \
                --name scan-${{ env.VM_SLUG }}-vm \
                --time "$AUTO_SHUTDOWN_TIME"

            elif [[ "${{ matrix.os_config.os }}" == "Rocky 9" ]]; then
              az vm create \
                --resource-group  ${{ env.AZURE_RG }} \
                --name            scan-${{ env.VM_SLUG }}-vm \
                --image           "$IMAGE_ID" \
                --admin-username  sysadmin \
                --ssh-key-values  ~/.ssh/scanner_key.pub \
                --location        ${{ env.AZURE_LOCATION }} \
                --size            ${{ env.VM_SIZE }} \
                --plan-publisher  resf \
                --plan-product    rockylinux-x86_64 \
                --plan-name       9-base \
                --nic-delete-option delete \
                --os-disk-delete-option delete

            else
              az vm create \
                --resource-group  ${{ env.AZURE_RG }} \
                --name            scan-${{ env.VM_SLUG }}-vm \
                --image           "$IMAGE_ID" \
                --admin-username  sysadmin \
                --ssh-key-values  ~/.ssh/scanner_key.pub \
                --location        ${{ env.AZURE_LOCATION }} \
                --size            ${{ env.VM_SIZE }} \
                --nic-delete-option delete \
                --os-disk-delete-option delete
            fi

            VM_IP=$(az vm show -d \
              -g ${{ env.AZURE_RG }} \
              -n scan-${{ env.VM_SLUG }}-vm \
              --query publicIps -o tsv)
            echo "VM_IP=$VM_IP" >> $GITHUB_ENV
            sleep 20
          fi

      # ──────────────────────────────────────────────────────────────────────
      # WAIT FOR SSH
      # ──────────────────────────────────────────────────────────────────────

      - name: Wait for SSH Connection
        run: |
          if [[ "${{ matrix.os_config.os }}" == "Windows Server 2022" ]]; then
            echo "Waiting for SSH key auth on Windows VM ($VM_IP)..."
            for i in {1..60}; do
              if ssh -o StrictHostKeyChecking=no \
                    -o ConnectTimeout=5 \
                    -o BatchMode=yes \
                    -i ~/.ssh/scanner_key \
                    azureuser@"$VM_IP" "echo ok" 2>/dev/null; then
                echo "SSH key auth succeeded after attempt $i."
                break
              fi
              echo "Attempt $i/60 — not ready, retrying in 20s..."
              sleep 20
              if [ "$i" -eq 60 ]; then
                echo "ERROR: SSH never became available."
                exit 1
              fi
            done
          elif [[ "${{ matrix.os_config.os }}" == "Huawei Rocky 9" ]]; then
            for i in {1..20}; do
              if ssh -o StrictHostKeyChecking=no \
                    -o ConnectTimeout=5 \
                    -i ~/.ssh/scanner_key \
                    sysadmin@"$VM_IP" exit 0 2>/dev/null; then   # <--- Changed root to sysadmin
                echo "SSH is up after attempt $i."
                break
              fi
              echo "Attempt $i/20 — SSH not ready, retrying in 10s..."
              sleep 10
              if [ "$i" -eq 20 ]; then
                echo "ERROR: SSH never became available after 200s."
                exit 1
              fi
            done
          else
            # Linux wait logic unchanged
            for i in {1..20}; do
              if ssh -o StrictHostKeyChecking=no \
                    -o ConnectTimeout=5 \
                    -i ~/.ssh/scanner_key \
                    sysadmin@"$VM_IP" exit 0 2>/dev/null; then
                echo "SSH is up after attempt $i."
                break
              fi
              echo "Attempt $i/20 — SSH not ready, retrying in 10s..."
              sleep 10
              if [ "$i" -eq 20 ]; then
                echo "ERROR: SSH never became available after 200s."
                exit 1
              fi
            done
          fi

      # # ──────────────────────────────────────────────────────────────────────
      # # DIAGNOSTIC DUMP (RUNS ONLY IF SSH FAILS)
      # # ──────────────────────────────────────────────────────────────────────
      
      - name: Re-authenticate to Azure (Diagnostic)
        if: failure() && matrix.os_config.os == 'Windows Server 2022'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Diagnose SSH state inside VM (Windows only)
        if: failure() && matrix.os_config.os == 'Windows Server 2022'
        run: |
          echo "SSH Wait loop failed! Checking sshd service state and firewall from inside the VM..."

          az vm run-command invoke \
            --resource-group ${{ env.AZURE_RG }} \
            --name scan-${{ env.VM_SLUG }}-vm \
            --command-id RunPowerShellScript \
            --scripts "
              Write-Output '--- sshd service ---'
              Get-Service sshd | Select Name, Status, StartType | Format-List

              Write-Output '--- Port 22 listener ---'
              netstat -ano | Select-String ':22'

              Write-Output '=== 4. CIS RESTORE LOG ==='
              Get-Content C:\Windows\Setup\Scripts\RestoreCIS.log -ErrorAction SilentlyContinue
            " \
            --query value[0].message -o tsv || true

      # # ──────────────────────────────────────────────────────────────────────
      # # SCAN PHASE
      # # ──────────────────────────────────────────────────────────────────────

      - name: Run Ubuntu OpenSCAP & Download Report
        if: ${{ matrix.os_config.os == 'Ubuntu 22.04' }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/scanner_key \
              sysadmin@${{ env.VM_IP }} << 'EOF'
            sudo apt-get update -qq
            sudo apt-get install -y libopenscap8 unzip wget
            wget -q https://github.com/ComplianceAsCode/content/releases/download/v0.1.74/scap-security-guide-0.1.74.zip
            unzip -q scap-security-guide-0.1.74.zip
            sudo oscap xccdf eval \
              --profile xccdf_org.ssgproject.content_profile_cis_level1_server \
              --report /tmp/ubuntu-cis-report.html \
              scap-security-guide-0.1.74/ssg-ubuntu2204-ds.xml || true
            sudo cp /tmp/ubuntu-cis-report.html /home/sysadmin/
            sudo chown sysadmin:sysadmin /home/sysadmin/ubuntu-cis-report.html
          EOF
          scp -o StrictHostKeyChecking=no -i ~/.ssh/scanner_key \
            sysadmin@${{ env.VM_IP }}:/home/sysadmin/ubuntu-cis-report.html \
            ./ubuntu-cis-report.html
      
      - name: Run Huawei Rocky OpenSCAP & Download Report
        if: ${{ matrix.os_config.os == 'Huawei Rocky 9' }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/scanner_key \
              sysadmin@${{ env.VM_IP }} << 'EOF'                 # <--- Changed root to sysadmin
            sudo dnf install -y openscap-scanner scap-security-guide
            sudo oscap xccdf eval \
              --profile xccdf_org.ssgproject.content_profile_cis_server_l1 \
              --report /tmp/hw-rocky-cis-report.html \
              /usr/share/xml/scap/ssg/content/ssg-rl9-ds.xml || true
            sudo cp /tmp/hw-rocky-cis-report.html /home/sysadmin/ # <--- Route to sysadmin home
            sudo chown sysadmin:sysadmin /home/sysadmin/hw-rocky-cis-report.html
          EOF
          scp -o StrictHostKeyChecking=no -i ~/.ssh/scanner_key \
            sysadmin@${{ env.VM_IP }}:/home/sysadmin/hw-rocky-cis-report.html \
            ./hw-rocky-cis-report.html

      - name: Run RHEL OpenSCAP & Download Report
        if: ${{ matrix.os_config.os == 'RHEL 9' }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/scanner_key \
              sysadmin@${{ env.VM_IP }} << 'EOF'
            sudo dnf install -y openscap-scanner scap-security-guide
            sudo oscap xccdf eval \
              --profile xccdf_org.ssgproject.content_profile_cis_server_l1 \
              --report /tmp/rhel-cis-report.html \
              /usr/share/xml/scap/ssg/content/ssg-rhel9-ds.xml || true
            sudo cp /tmp/rhel-cis-report.html /home/sysadmin/
            sudo chown sysadmin:sysadmin /home/sysadmin/rhel-cis-report.html
          EOF
          scp -o StrictHostKeyChecking=no -i ~/.ssh/scanner_key \
            sysadmin@${{ env.VM_IP }}:/home/sysadmin/rhel-cis-report.html \
            ./rhel-cis-report.html

      - name: Run Rocky OpenSCAP & Download Report
        if: ${{ matrix.os_config.os == 'Rocky 9' }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/scanner_key \
              sysadmin@${{ env.VM_IP }} << 'EOF'
            sudo dnf install -y openscap-scanner scap-security-guide
            sudo oscap xccdf eval \
              --profile xccdf_org.ssgproject.content_profile_cis_server_l1 \
              --report /tmp/rocky-cis-report.html \
              /usr/share/xml/scap/ssg/content/ssg-rl9-ds.xml || true
            sudo cp /tmp/rocky-cis-report.html /home/sysadmin/
            sudo chown sysadmin:sysadmin /home/sysadmin/rocky-cis-report.html
          EOF
          scp -o StrictHostKeyChecking=no -i ~/.ssh/scanner_key \
            sysadmin@${{ env.VM_IP }}:/home/sysadmin/rocky-cis-report.html \
            ./rocky-cis-report.html

      - name: Run Cinc Auditor & Generate Multi-Format Reports (Windows)
        if: ${{ matrix.os_config.os == 'Windows Server 2022' }}
        run: |
          echo "Installing Cinc Auditor..."
          curl -sL https://omnitruck.cinc.sh/install.sh | sudo bash -s -- -P cinc-auditor

          echo "Waiting 90 seconds for the Azure VM Agent to inject local credentials..."
          sleep 90

          echo "Executing Cinc Auditor against hardened Windows Image..."
          # Extended 10-attempt loop to outlast Azure provisioning delays
          for i in {1..10}; do
            if cinc-auditor exec https://github.com/dev-sec/windows-baseline \
              -t ssh://azureuser@${{ env.VM_IP }} \
              -i ~/.ssh/scanner_key \
              --input server_role=member_server \
              --input domain_joined=false \
              --backend-cache \
              --reporter html:./windows-cis-report.html json:./windows-cis-report.json cli; then
              
              echo "Cinc Auditor completed successfully."
              break
            else
              echo "Warning: Authentication dropped. Retrying in 15 seconds..."
              sleep 15
            fi
          done

          echo "Reports generated successfully."
          echo "HTML Size: $(du -sh ./windows-cis-report.html | cut -f1 || echo '0')"
          echo "JSON Size: $(du -sh ./windows-cis-report.json | cut -f1 || echo '0')"

      # # ──────────────────────────────────────────────────────────────────────
      # # TEARDOWN
      # # ──────────────────────────────────────────────────────────────────────

      - name: Prune Empty Reports (Failsafe)
        if: always()
        run: |
          echo "Removing any 0-byte reports to prevent GitHub Release API errors..."
          find . -maxdepth 1 -name "*-cis-report.*" -type f -size 0 -print -delete

      # NEW: The 3rd Re-auth step. If the scan took 15 minutes, the Azure CLI token is dead!
      - name: Re-authenticate to Azure (Teardown)
        if: always() && env.VM_IP != '' && matrix.os_config.os != 'Huawei Rocky 9'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Destroy Ephemeral VM (Azure)
        if: always() && env.VM_IP != '' && matrix.os_config.os != 'Huawei Rocky 9'
        run: |
          az vm delete \
            --resource-group ${{ env.AZURE_RG }} \
            --name scan-${{ env.VM_SLUG }}-vm \
            --yes
          az network public-ip list \
            --resource-group ${{ env.AZURE_RG }} \
            --query "[?ipConfiguration==null].[name]" -o tsv \
            | xargs -I {} az network public-ip delete \
                --resource-group ${{ env.AZURE_RG }} --name {} || true
          az network nsg delete \
            --resource-group ${{ env.AZURE_RG }} \
            --name scan-${{ env.VM_SLUG }}-vmNSG || true

      - name: Destroy Ephemeral VM (Huawei)
        if: always() && env.VM_IP != '' && matrix.os_config.os == 'Huawei Rocky 9'
        run: |
          hcloud ECS DeleteServers \
            --cli-region="${{ vars.HW_LOCATION }}" \
            --servers.0.id="$(hcloud ECS ListServers \
              --cli-region=${{ vars.HW_LOCATION }} \
              --name=scan-hw-rocky-vm \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['servers'][0]['id'])")" \
            --delete_volume=true || true
          hcloud ECS DeleteKeypair \
            --cli-region="${{ vars.HW_LOCATION }}" \
            --KeyName="scanner-key-${{ github.run_number }}" || true

      - name: Upload Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.VM_SLUG }}-report
          path: ./*-cis-report.*

      # ──────────────────────────────────────────────────────────────────────
      # TEARDOWN & RUNNER CLEANUP
      # ──────────────────────────────────────────────────────────────────────

      - name: Clean up Self-Hosted Runner State
        if: always()
        run: |
          echo "Cleaning up temporary files to prevent state contamination..."
          
          # 1. Destroy the ephemeral SSH keys
          rm -f ~/.ssh/scanner_key ~/.ssh/scanner_key.pub
          
          # 2. Remove the temporary Python & PowerShell deployment scripts
          rm -f /tmp/get_hw_image.py /tmp/get_hw_ip.py /tmp/inject-ssh-key.ps1
          
          # 3. Clean up the generated compliance reports from the local workspace
          rm -f ./*-cis-report.*
          
          # 4. (Optional but recommended) Prune leftover Packer crash logs
          rm -f ./crash.log
          
          echo "Runner cleanup complete."

  # ============================================================
  # STAGE 3: PUBLISH (Tag & Release)
  # ============================================================
  release:
    name: Publish DevSecOps Release
    needs: [prepare, matrix-factory]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && !failure() }}
    steps:
      - name: Download All Reports
        uses: actions/download-artifact@v4
        with:
          path: ./reports
          merge-multiple: true

      - name: Push Official Git Tag
        if: ${{ inputs.scan_only != true }}
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ needs.prepare.outputs.new_version }}

      - name: Publish Golden Image Release
        if: ${{ inputs.scan_only != true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.new_version }}
          name: "Golden Image Release v${{ needs.prepare.outputs.new_version }}"
          body: |
            ## Golden Image Factory — v${{ needs.prepare.outputs.new_version }}

            Automated CIS Level 1 Compliance Reports for all built images.

            | Image | Benchmark | Profile |
            |-------|-----------|---------|
            | Ubuntu 22.04 | CIS Ubuntu Linux 22.04 LTS | Level 1 Server |
            | RHEL 9 | CIS Red Hat Enterprise Linux 9 | Level 1 Server |
            | Rocky Linux 9 | CIS AlmaLinux/Rocky Linux 9 | Level 1 Server |
            | Windows Server 2022 | CIS Microsoft Windows Server 2022 | Level 1 Member Server |

            **Azure Compute Gallery image version:** `${{ needs.prepare.outputs.new_version }}`

            > The Windows compliance report is generated at **build time** (pre-sysprep)
            > by `run-compliance-scan.ps1` and baked into the image at `C:\CIS-Reports\`.
          fail_on_unmatched_files: false
          files: ./reports/*-cis-report.*

      - name: Publish Ad-Hoc Scan Report
        if: ${{ inputs.scan_only == true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: scan-report-${{ github.run_number }}
          name: "Ad-Hoc Compliance Scan #${{ github.run_number }}"
          body: |
            Manual CIS Level 1 compliance evaluation against existing Gallery Images.
            *(No new image versions were built during this run.)*

            > **Windows note:** The report was retrieved from the pre-baked
            > `C:\CIS-Reports\` directory inside the deployed VM.
          fail_on_unmatched_files: false
          files: |
            ./reports/*-cis-report.html
            ./reports/*-cis-report.json