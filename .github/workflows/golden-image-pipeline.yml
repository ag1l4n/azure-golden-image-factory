name: Golden Image Factory Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      os_choice:
        description: 'Target Operating System'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ubuntu
          - rhel
          - windows
      scan_only:
        description: 'Skip Packer Build (Run Compliance Scan Only)'
        required: true
        default: false
        type: boolean
      azure_region:
        description: 'Deployment Region (Leave blank to use default, southeastasia)'
        required: false
        type: string
      ubuntu_image_name_override:
        description: 'Custom Ubuntu Image Name Override (Optional)'
        required: false
        type: string
      rhel_image_name_override:
        description: 'Custom RHEL Image Name Override (Optional)'
        required: false
        type: string
      windows_image_name_override:
        description: 'Custom Windows Image Name Override (Optional)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  # ============================================================
  # STAGE 1: PREPARE (Calculate SemVer & Build Matrix)
  # ============================================================
  prepare:
    name: Prepare Pipeline & SemVer
    runs-on: ubuntu-latest
    outputs:
      new_version:   ${{ steps.version.outputs.clean_version || '1.0.0' }}
      matrix_config: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Calculate Next SemVer
        id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: patch

      - name: Normalize Version String
        id: version
        run: |
          RAW="${{ steps.semver.outputs.new_version }}"
          CLEAN="${RAW#v}"        # strip leading 'v' if present
          CLEAN="${CLEAN%%-*}"    # strip pre-release suffix
          echo "clean_version=$CLEAN" >> $GITHUB_OUTPUT

      - name: Set Dynamic Matrix
        id: set-matrix
        run: |
          CHOICE="${{ inputs.os_choice }}"
          if [[ -z "$CHOICE" || "$CHOICE" == "all" ]]; then
            echo 'matrix=["ubuntu", "rhel", "windows"]' >> $GITHUB_OUTPUT
          elif [[ "$CHOICE" == "ubuntu" ]]; then
            echo 'matrix=["ubuntu"]' >> $GITHUB_OUTPUT
          elif [[ "$CHOICE" == "rhel" ]]; then
            echo 'matrix=["rhel"]' >> $GITHUB_OUTPUT
          elif [[ "$CHOICE" == "windows" ]]; then
            echo 'matrix=["windows"]' >> $GITHUB_OUTPUT
          fi

  # ============================================================
  # STAGE 2: BUILD & SCAN (Parallel Matrix)
  # ============================================================
  matrix-factory:
    name: Build & Scan (${{ matrix.os }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # Let other OS legs complete even if one fails
      matrix:
        os: ${{ fromJson(needs.prepare.outputs.matrix_config) }}

    env:
      AZURE_RG:       ${{ vars.AZURE_RG }}
      AZURE_GALLERY:  ${{ vars.AZURE_GALLERY }}
      AZURE_LOCATION: ${{ inputs.azure_region || vars.AZURE_LOCATION }}
      VM_SIZE:        ${{ vars.VM_SIZE }}
      WINDOWS_ADMIN_PASS: ${{ secrets.WINDOWS_LOCAL_ADMIN_PASSWORD }}

      # ── Packer variables shared across all OS legs ──────────────────────
      PKR_VAR_resource_group:        ${{ vars.AZURE_RG }}
      PKR_VAR_gallery_name:          ${{ vars.AZURE_GALLERY }}
      PKR_VAR_location:              ${{ inputs.azure_region || vars.AZURE_LOCATION }}
      PKR_VAR_vm_size:               ${{ vars.VM_SIZE }}
      PKR_VAR_subscription_id:       ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      PKR_VAR_client_id:             ${{ secrets.AZURE_CLIENT_ID }}
      PKR_VAR_client_secret:         ${{ secrets.AZURE_CLIENT_SECRET }}

      # ── Linux-only Packer variables (declared in ubuntu/rhel templates) ──
      PKR_VAR_local_admin_username:  sysadmin
      PKR_VAR_local_admin_password:  ${{ secrets.WINDOWS_LOCAL_ADMIN_PASSWORD }}

      # ── Windows-only Packer variables ────────────────────────────────────
      # PKR_VAR_tenant_id is required by the azure-arm plugin for Windows builds.
      # Add AZURE_TENANT_ID to your repository secrets.
      # (Extract it from your AZURE_CREDENTIALS JSON: .tenantId)
      PKR_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Authenticate to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ──────────────────────────────────────────────────────────────────────
      # PACKER BUILD PHASE
      # ──────────────────────────────────────────────────────────────────────

      - name: Setup HashiCorp Packer
        if: ${{ inputs.scan_only != true }}
        uses: hashicorp/setup-packer@main
        with:
          version: 'latest'

      # Windows builds need Ansible + WinRM libraries on the runner.
      # This step is a no-op for ubuntu/rhel (those templates use SSH provisioners).
      - name: Install Ansible & WinRM dependencies (Windows only)
        if: ${{ inputs.scan_only != true && matrix.os == 'windows' }}
        run: |
          pip install \
            ansible~=9.0 \
            pywinrm \
            xmltodict \
            passlib \
            jmespath

      - name: Install Ansible Galaxy roles (Windows only)
        if: ${{ inputs.scan_only != true && matrix.os == 'windows' }}
        working-directory: ./ansible
        run: |
          ansible-galaxy install -r requirements.yml --roles-path roles/

      - name: Packer Init
        if: ${{ inputs.scan_only != true }}
        run: packer init .
        working-directory: >-
          ${{ matrix.os == 'ubuntu' && './packer'
           || matrix.os == 'rhel'    && './packer-rhel'
           ||                           './packer-windows' }}

      - name: Build Golden Image
        if: ${{ inputs.scan_only != true }}
        run: |
          packer build \
            -force \
            -var "image_version=${{ needs.prepare.outputs.new_version }}" \
            .
        working-directory: >-
          ${{ matrix.os == 'ubuntu' && './packer'
           || matrix.os == 'rhel'    && './packer-rhel'
           ||                           './packer-windows' }}
        env:
          # Pass the image definition name for Windows so the gallery
          # destination matches what the scan step looks up.
          # For ubuntu/rhel, PKR_VAR_image_definition_name is ignored
          # (those templates don't declare it).
          PKR_VAR_image_definition_name: >-
            ${{ matrix.os == 'windows'
             && (inputs.windows_image_name_override || 'windows-server-2022-cis')
             || '' }}
      
      # ──────────────────────────────────────────────────────────────────────
      # DEPLOY EPHEMERAL VM FOR SCANNING
      # ──────────────────────────────────────────────────────────────────────

      - name: Generate Ephemeral SSH Key
        run: ssh-keygen -t ed25519 -f ~/.ssh/scanner_key -N ""

      - name: Resolve Target Image Name
        id: image
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu" ]]; then
            echo "name=${{ inputs.ubuntu_image_name_override || 'ubuntu-nvme-cis' }}" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.os }}" == "rhel" ]]; then
            echo "name=${{ inputs.rhel_image_name_override || 'rhel-nvme-cis' }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ inputs.windows_image_name_override || 'windows-server-2022-cis' }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Ephemeral VM
        run: |
          IMAGE_ID=$(az sig image-definition show \
            --resource-group  ${{ env.AZURE_RG }} \
            --gallery-name    ${{ env.AZURE_GALLERY }} \
            --gallery-image-definition ${{ steps.image.outputs.name }} \
            --query id --output tsv)

          if [[ "${{ matrix.os }}" == "windows" ]]; then
            # Windows VM: OpenSSH is enabled in the image so SCP works.
            # NSG rule SSH (port 22) is opened for the scanner — the
            # CIS WinRM-disabling controls only affect WinRM (5985/5986).
            az vm create \
              --resource-group  ${{ env.AZURE_RG }} \
              --name            scan-${{ matrix.os }}-vm \
              --image           "$IMAGE_ID" \
              --admin-username  sysadmin \
              --admin-password  "${{ env.WINDOWS_ADMIN_PASS }}" \
              --location        ${{ env.AZURE_LOCATION }} \
              --size            ${{ env.VM_SIZE }} \
              --nic-delete-option delete \
              --os-disk-delete-option delete \
              --nsg-rule SSH
          else
            az vm create \
              --resource-group  ${{ env.AZURE_RG }} \
              --name            scan-${{ matrix.os }}-vm \
              --image           "$IMAGE_ID" \
              --admin-username  sysadmin \
              --ssh-key-values  ~/.ssh/scanner_key.pub \
              --location        ${{ env.AZURE_LOCATION }} \
              --size            ${{ env.VM_SIZE }} \
              --nic-delete-option delete \
              --os-disk-delete-option delete
          fi

          VM_IP=$(az vm show -d \
            -g ${{ env.AZURE_RG }} \
            -n scan-${{ matrix.os }}-vm \
            --query publicIps -o tsv)
          echo "VM_IP=$VM_IP" >> $GITHUB_ENV
          sleep 20
          
      - name: Diagnose SSH state inside VM (Windows only)
        if: ${{ matrix.os == 'windows' }}
        run: |
          echo "Checking sshd service state and firewall from inside the VM..."
          az vm run-command invoke \
            --resource-group ${{ env.AZURE_RG }} \
            --name scan-${{ matrix.os }}-vm \
            --command-id RunPowerShellScript \
            --scripts "
              Write-Output '--- sshd service ---'
              Get-Service sshd | Select Name, Status, StartType | Format-List
              
              Write-Output '--- Port 22 listener ---'
              netstat -ano | Select-String ':22'
              
              Write-Output '--- GP Firewall rule for SSH ---'
              Get-Item 'HKLM:\SOFTWARE\Policies\Microsoft\WindowsFirewall\FirewallRules' -ErrorAction SilentlyContinue | Get-ItemProperty | Select-Object 'OpenSSH-Server-Inbound-TCP22'
              
              Write-Output '--- AllowLocalPolicyMerge (should be 0 for CIS) ---'
              (Get-ItemProperty HKLM:\SOFTWARE\Policies\Microsoft\WindowsFirewall\PublicProfile).AllowLocalPolicyMerge

              Write-Output '=== 1. SSH SERVICE STATUS ==='
              Get-Service sshd | Select-Object Status, Name, DisplayName
              
              Write-Output '=== 2. OS FIREWALL STATUS (PORT 22) ==='
              Get-NetFirewallPortFilter | Where-Object LocalPort -eq 22 | Get-NetFirewallRule | Select-Object Name, Action, Enabled
              
              Write-Output '=== 3. OPENSSH EVENT LOGS ==='
              Get-EventLog -LogName Application -Source OpenSSH -Newest 5 -ErrorAction SilentlyContinue | Select-Object Message
              
              Write-Output '=== 4. CIS RESTORE LOG ==='
              Get-Content C:\Windows\Setup\Scripts\RestoreCIS.log -ErrorAction SilentlyContinue
            " \
            --query value[0].message -o tsv || true
            
          if [[ "${{ matrix.os }}" == "windows" ]]; then
            echo "Waiting for SSH on Windows VM ($VM_IP)..."
            for i in {1..30}; do
              if nc -zw3 "$VM_IP" 22 2>/dev/null; then
                echo "Port 22 open after attempt $i."
                break
              fi
              echo "Attempt $i/30 — not ready, retrying in 15s..."
              sleep 15
              if [ "$i" -eq 30 ]; then
                echo "ERROR: Windows VM SSH never became reachable."
                exit 1
              fi
            done
            # Extra grace period for Windows to finish first-boot tasks
            sleep 30
          else
            echo "Waiting for SSH on ${{ matrix.os }} VM ($VM_IP)..."
            for i in {1..20}; do
              if ssh -o StrictHostKeyChecking=no \
                     -o ConnectTimeout=5 \
                     -i ~/.ssh/scanner_key \
                     sysadmin@"$VM_IP" exit 0 2>/dev/null; then
                echo "SSH is up after attempt $i."
                break
              fi
              echo "Attempt $i/20 — SSH not ready, retrying in 10s..."
              sleep 10
              if [ "$i" -eq 20 ]; then
                echo "ERROR: SSH never became available after 200s."
                exit 1
              fi
            done
          fi

      # ──────────────────────────────────────────────────────────────────────
      # SCAN PHASE
      # ──────────────────────────────────────────────────────────────────────

      - name: Run Ubuntu OpenSCAP & Download Report
        if: ${{ matrix.os == 'ubuntu' }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/scanner_key \
              sysadmin@${{ env.VM_IP }} << 'EOF'
            sudo apt-get update -qq
            sudo apt-get install -y libopenscap8 unzip wget
            wget -q https://github.com/ComplianceAsCode/content/releases/download/v0.1.74/scap-security-guide-0.1.74.zip
            unzip -q scap-security-guide-0.1.74.zip
            sudo oscap xccdf eval \
              --profile xccdf_org.ssgproject.content_profile_cis_level1_server \
              --report /tmp/ubuntu-cis-report.html \
              scap-security-guide-0.1.74/ssg-ubuntu2204-ds.xml || true
            sudo cp /tmp/ubuntu-cis-report.html /home/sysadmin/
            sudo chown sysadmin:sysadmin /home/sysadmin/ubuntu-cis-report.html
          EOF
          scp -o StrictHostKeyChecking=no -i ~/.ssh/scanner_key \
            sysadmin@${{ env.VM_IP }}:/home/sysadmin/ubuntu-cis-report.html \
            ./ubuntu-cis-report.html

      - name: Run RHEL OpenSCAP & Download Report
        if: ${{ matrix.os == 'rhel' }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/scanner_key \
              sysadmin@${{ env.VM_IP }} << 'EOF'
            sudo dnf install -y openscap-scanner scap-security-guide
            sudo oscap xccdf eval \
              --profile xccdf_org.ssgproject.content_profile_cis_server_l1 \
              --report /tmp/rhel-cis-report.html \
              /usr/share/xml/scap/ssg/content/ssg-rhel9-ds.xml || true
            sudo cp /tmp/rhel-cis-report.html /home/sysadmin/
            sudo chown sysadmin:sysadmin /home/sysadmin/rhel-cis-report.html
          EOF
          scp -o StrictHostKeyChecking=no -i ~/.ssh/scanner_key \
            sysadmin@${{ env.VM_IP }}:/home/sysadmin/rhel-cis-report.html \
            ./rhel-cis-report.html

      # ── Windows Compliance Scan: Cinc Auditor ────────────────────────────
      # Cinc Auditor is the 100% free, open-source distribution of Chef InSpec.
      # Runs from the GitHub Runner, connects via SSH, evaluates the DevSec 
      # Windows Baseline, and generates a native HTML report natively.
      # ─────────────────────────────────────────────────────────────────────

      - name: Run Cinc Auditor & Generate Multi-Format Reports (Windows)
        if: ${{ matrix.os == 'windows' }}
        run: |
          echo "Installing Cinc Auditor on GitHub Runner..."
          curl -sL https://omnitruck.cinc.sh/install.sh | sudo bash -s -- -P cinc-auditor

          echo "Executing DevSec Windows Baseline over SSH..."
          
          # Native multi-reporting: Output HTML, JSON (for Heimdall), and CLI simultaneously
          cinc-auditor exec https://github.com/dev-sec/windows-baseline \
            -t ssh://sysadmin@${{ env.VM_IP }} \
            --password "${{ env.WINDOWS_ADMIN_PASS }}" \
            --backend-cache \
            --reporter html:./windows-cis-report.html json:./windows-cis-report.json cli || true

          echo "Reports generated successfully."
          echo "HTML Size: $(du -sh ./windows-cis-report.html | cut -f1)"
          echo "JSON Size: $(du -sh ./windows-cis-report.json | cut -f1)"

      # ──────────────────────────────────────────────────────────────────────
      # TEARDOWN
      # ──────────────────────────────────────────────────────────────────────

      - name: Destroy Ephemeral VM
        if: ${{ always() && env.VM_IP != '' }}
        run: |
          az vm delete \
            --resource-group ${{ env.AZURE_RG }} \
            --name scan-${{ matrix.os }}-vm \
            --yes

          # Clean up any orphaned public IPs left behind
          az network public-ip list \
            --resource-group ${{ env.AZURE_RG }} \
            --query "[?ipConfiguration==null].[name]" -o tsv \
            | xargs -I {} az network public-ip delete \
                --resource-group ${{ env.AZURE_RG }} --name {} || true

      - name: Upload Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-report
          path: ./*-cis-report.*

  # ============================================================
  # STAGE 3: PUBLISH (Tag & Release)
  # ============================================================
  release:
    name: Publish DevSecOps Release
    needs: [prepare, matrix-factory]
    runs-on: ubuntu-latest
    # Guard: don't publish a release if any leg failed.
    # fail-fast: false means matrix-factory 'completes' even with leg
    # failures, so we check explicitly here to avoid tagging a broken build.
    if: ${{ !cancelled() && !failure() }}
    steps:
      - name: Download All Reports
        uses: actions/download-artifact@v4
        with:
          path: ./reports
          merge-multiple: true

      # ── Versioned release (normal build run) ────────────────────────────
      - name: Push Official Git Tag
        if: ${{ inputs.scan_only != true }}
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: v${{ needs.prepare.outputs.new_version }}

      - name: Publish Golden Image Release
        if: ${{ inputs.scan_only != true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.new_version }}
          name: "Golden Image Release v${{ needs.prepare.outputs.new_version }}"
          body: |
            ## Golden Image Factory — v${{ needs.prepare.outputs.new_version }}

            Automated CIS Level 1 Compliance Reports for all built images.

            | Image | Benchmark | Profile |
            |-------|-----------|---------|
            | Ubuntu 22.04 | CIS Ubuntu Linux 22.04 LTS | Level 1 Server |
            | RHEL 9 | CIS Red Hat Enterprise Linux 9 | Level 1 Server |
            | Windows Server 2022 | CIS Microsoft Windows Server 2022 | Level 1 Member Server |

            **Azure Compute Gallery image version:** `${{ needs.prepare.outputs.new_version }}`

            > The Windows compliance report is generated at **build time** (pre-sysprep)
            > by `run-compliance-scan.ps1` and baked into the image at `C:\CIS-Reports\`.
            > This means the report reflects the exact hardened state of the image,
            > not a post-deployment scan that may drift.
          fail_on_unmatched_files: false
          files: ./reports/*-cis-report.*

      # ── Ad-hoc scan release (scan_only run) ──────────────────────────────
      - name: Publish Ad-Hoc Scan Report
        if: ${{ inputs.scan_only == true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: scan-report-${{ github.run_number }}
          name: "Ad-Hoc Compliance Scan #${{ github.run_number }}"
          body: |
            Manual CIS Level 1 compliance evaluation against existing Gallery Images.
            *(No new image versions were built during this run.)*

            > **Windows note:** The report was retrieved from the pre-baked
            > `C:\CIS-Reports\` directory inside the deployed VM.
            > To run a live full OpenSCAP scan instead, set the repository
            > variable `WINDOWS_RUN_FULL_SCAN=true` before triggering this workflow.
          fail_on_unmatched_files: false
          files: ./reports/*-cis-report.html
