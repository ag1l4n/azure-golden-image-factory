name: Golden Image Factory Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  
permissions:
  contents: write

jobs:
  bake-golden-image:
    name: Build CIS Hardened RHEL and Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Authenticate to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup HashiCorp Packer
        uses: hashicorp/setup-packer@main
        with:
          version: 'latest'

      - name: Packer Init RHEL
        run: packer init .
        working-directory: ./packer-rhel

      - name: Build RHEL 9 Golden Image
        run: packer build -var "image_version=1.0.${{ github.run_number }}" .                  
        working-directory: ./packer-rhel
        
      - name: Packer Init Ubuntu
        run: packer init .
        working-directory: ./packer

      - name: Build Ubuntu 22.04 Golden Image
        run: packer build -var "image_version=1.0.${{ github.run_number }}" .                  
        working-directory: ./packer
     
     # --- UBUNTU COMPLIANCE SCAN ---
      - name: Generate Ephemeral SSH Key
        run: ssh-keygen -t ed25519 -f ~/.ssh/scanner_key -N ""

      - name: Deploy Ubuntu Ephemeral VM
        run: |
          IMAGE_ID=$(az sig image-definition show --resource-group rg-hardening-pipeline --gallery-name galhardening --gallery-image-definition ubuntu-nvme-cis --query id --output tsv)
          
          az vm create \
            --resource-group rg-hardening-pipeline \
            --name scan-ubuntu-vm \
            --image $IMAGE_ID \
            --admin-username sysadmin \
            --ssh-key-values ~/.ssh/scanner_key.pub \
            --location southcentralus \
            --size Standard_D2as_v7 \
            --nic-delete-option delete \
            --os-disk-delete-option delete
            
          VM_IP=$(az vm show -d -g rg-hardening-pipeline -n scan-ubuntu-vm --query publicIps -o tsv)
          echo "UBUNTU_IP=$VM_IP" >> $GITHUB_ENV
          sleep 30 # Give the VM time to fully boot the SSH service

      - name: Run OpenSCAP & Download Report
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/scanner_key sysadmin@${{ env.UBUNTU_IP }} << 'EOF'
            sudo apt-get update
            # Install the OpenSCAP engine and unzip utility
            sudo apt-get install -y libopenscap8 unzip wget
            
            wget https://github.com/ComplianceAsCode/content/releases/download/v0.1.74/scap-security-guide-0.1.74.zip
            unzip scap-security-guide-0.1.74.zip
            
            # Run scan using the downloaded datastream and force exit code 0
            sudo oscap xccdf eval \
              --profile xccdf_org.ssgproject.content_profile_cis_level1_server \
              --report /tmp/ubuntu-cis-report.html \
              scap-security-guide-0.1.74/ssg-ubuntu2204-ds.xml || true

            sudo mv /tmp/ubuntu-cis-report.html /home/sysadmin/ubuntu-cis-report.html
            sudo chown sysadmin:sysadmin /home/sysadmin/ubuntu-cis-report.html
          EOF
          
          # Secure Copy (SCP) the report back to the GitHub Runner
          scp -o StrictHostKeyChecking=no -i ~/.ssh/scanner_key sysadmin@${{ env.UBUNTU_IP }}:/home/sysadmin/ubuntu-cis-report.html ./ubuntu-cis-report.html

      - name: Destroy Ubuntu Ephemeral VM
        if: always() # CRITICAL: This ensures the VM is deleted even if a previous step fails!
        run: |
          az vm delete --resource-group rg-hardening-pipeline --name scan-ubuntu-vm --yes
          # Clean up any orphaned Public IPs to save our quota
          az network public-ip list --resource-group rg-hardening-pipeline --query "[?ipConfiguration==null].[name]" -o tsv | xargs -I {} az network public-ip delete --resource-group rg-hardening-pipeline --name {} || true

              # --- RHEL COMPLIANCE SCAN ---
      - name: Deploy RHEL Ephemeral VM
        run: |
          IMAGE_ID=$(az sig image-definition show --resource-group rg-hardening-pipeline --gallery-name galhardening --gallery-image-definition rhel-nvme-cis --query id --output tsv)
          
          az vm create \
            --resource-group rg-hardening-pipeline \
            --name scan-rhel-vm \
            --image $IMAGE_ID \
            --admin-username sysadmin \
            --ssh-key-values ~/.ssh/scanner_key.pub \
            --location southcentralus \
            --size Standard_D2as_v7 \
            --nic-delete-option delete \
            --os-disk-delete-option delete
            
          VM_IP=$(az vm show -d -g rg-hardening-pipeline -n scan-rhel-vm --query publicIps -o tsv)
          echo "RHEL_IP=$VM_IP" >> $GITHUB_ENV
          sleep 30

      - name: Run OpenSCAP & Download Report
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/scanner_key sysadmin@${{ env.RHEL_IP }} << 'EOF'
            sudo dnf install -y openscap-scanner scap-security-guide
            sudo oscap xccdf eval --profile xccdf_org.ssgproject.content_profile_cis_server_l1 --report /tmp/rhel-cis-report.html /usr/share/xml/scap/ssg/content/ssg-rhel9-ds.xml || true

            sudo mv /tmp/rhel-cis-report.html /home/sysadmin/rhel-cis-report.html
            sudo chown sysadmin:sysadmin /home/sysadmin/rhel-cis-report.html
          EOF
          
          scp -o StrictHostKeyChecking=no -i ~/.ssh/scanner_key sysadmin@${{ env.RHEL_IP }}:/home/sysadmin/rhel-cis-report.html ./rhel-cis-report.html

      - name: Destroy RHEL Ephemeral VM
        if: always()
        run: |
          az vm delete --resource-group rg-hardening-pipeline --name scan-rhel-vm --yes
          az network public-ip list --resource-group rg-hardening-pipeline --query "[?ipConfiguration==null].[name]" -o tsv | xargs -I {} az network public-ip delete --resource-group rg-hardening-pipeline --name {} || true

      # --- PUBLISH DEVSECOPS RELEASE ---
      - name: Publish CIS Reports to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: always() # CRITICAL: Publish the release even if one of the OS builds fails
        with:
          tag_name: build-${{ github.run_number }}
          name: "Golden Image Build #${{ github.run_number }}"
          body: "Automated OpenSCAP CIS Level 1 Compliance Reports generated by the DevSecOps Pipeline."
          fail_on_unmatched_files: false
          files: |
            ./*-cis-report.html
