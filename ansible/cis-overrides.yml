---
# ── 1. Core Role Toggles ──────────────────────────────────────────────
# The official ansible-lockdown prefix for Server 2022 is 'win22cis_'
win22cis_level_1: true
win22cis_level_2: false

# ── 2. Force Advanced Audit Policies ──────────────────────────────────
# By default, the role skips audit policies unless explicitly told to configure them.
# This single variable will fix dozens of audit failures in Heimdall!
win22cis_setup_audit: true

# ── 3. Password Policies ──────────────────────────────────────────────
win22cis_pass_max_days: 60
win22cis_pass_min_days: 1
win22cis_pass_complex: true

# ── 4. Account Lockout Policies ───────────────────────────────────────
win22cis_rule_1_2_1: true
win22cis_rule_1_2_2: true
win22cis_rule_1_2_3: true

# ── 5. LAPS Configuration (Fixes windows-179 to 184) ──────────────────
win22cis_rule_18_2_1: true
win22cis_rule_18_2_2: true
win22cis_rule_18_2_3: true
win22cis_rule_18_2_4: true
win22cis_rule_18_2_5: true
win22cis_rule_18_2_6: true

# ── 6. RDP Hardening ──────────────────────────────────────────────────
win22cis_rule_18_9_78_2_1: true
win22cis_rule_18_9_78_3_9_1: true

# ── 7. Windows Defender ───────────────────────────────────────────────
win22cis_rule_18_9_107_2_1_1: true
win22cis_rule_18_9_107_5_1: true

# ── 8. Disable Unnecessary Services ───────────────────────────────────
win22cis_rule_18_9_105_1: true
win22cis_rule_18_9_105_2: true
win22cis_rule_18_9_13_1: true

# ── 9. Packer WinRM Overrides (Do not break the build) ────────────────
win22cis_rule_2_2_2: false  # Do not rename the local administrator
win22cis_rule_18_3_1: false # Handled via post-script to keep WinRM alive
